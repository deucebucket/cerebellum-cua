name: Release

# Builds the sdist + wheel and publishes to PyPI when a version tag (v*) is
# pushed. Publishing uses PyPI Trusted Publishing (OIDC) — no API token is
# stored in the repo.
#
# MAINTAINER SETUP (one-time, required before the first tag):
#   1. Create the project on PyPI (or pre-register the name).
#   2. On PyPI: Project -> Settings -> Publishing -> add a Trusted Publisher with
#        Owner:        deucebucket
#        Repository:   cerebellum-cua
#        Workflow:     release.yml
#        Environment:  pypi   (must match the `environment:` below)
#   3. In this repo: Settings -> Environments -> create an environment named
#      `pypi` (optionally add release protection rules / required reviewers).
# Until that is configured the `publish` job will fail at the upload step; the
# `build` job (and twine check) still run on every tag.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing requires this environment and the id-token permission.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
